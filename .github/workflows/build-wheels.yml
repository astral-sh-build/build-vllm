name: Build wheels

permissions: {}

on:
  workflow_dispatch:
    inputs:
      vllm_version:
        description: "vLLM version"
        required: true
        default: "v0.20.2"
        type: string
  pull_request:
    branches:
      - main
  release:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  plan-matrix:
    name: Plan vLLM build matrix
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6
        with:
          version: "0.9.26"
          enable-cache: false

      - name: Generate build matrix
        id: generate-matrix
        run: |
          echo "matrix=$(uv run --script plan-matrix.py)" >> $GITHUB_OUTPUT
        env:
          LIMIT_MATRIX: ${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'full-build') && '1' || '0' }}

  build_wheels:
    name: Build wheels on ${{ matrix.RUNNER }} (${{ matrix.python-version }})
    needs: [plan-matrix]
    runs-on: ${{ matrix.RUNNER }}
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan-matrix.outputs.matrix) }}

    steps:
      - name: Determine vLLM version
        id: vllm-version
        run: |
          # Extract vLLM version from tag. Tags can be either:
          # - v0.20.2 (legacy format; maps directly to vLLM version)
          # - v0.20.2-r1 (new format; strip -rN suffix to get vLLM version)
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            TAG="${GITHUB_REF_NAME}"
            # Remove -rN suffix if present
            VLLM_VERSION="${TAG%-r*}"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VLLM_VERSION="${INPUTS_VLLM_VERSION}"
          else
            VLLM_VERSION="v0.20.2"
          fi
          echo "version=${VLLM_VERSION}" >> $GITHUB_OUTPUT
          echo "Using vLLM version: ${VLLM_VERSION}"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          INPUTS_VLLM_VERSION: ${{ inputs.vllm_version }}

      - name: Checkout vllm
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: vllm-project/vllm
          ref: ${{ steps.vllm-version.outputs.version }}
          fetch-tags: true
          persist-credentials: false

      - name: Checkout build scripts
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          path: build_scripts
          persist-credentials: false

      - name: Apply patches
        run: |
          if [ -d "build_scripts/patches/${VLLM_VERSION}" ]; then
            for patch in build_scripts/patches/${VLLM_VERSION}/*.patch; do
              if [ -f "$patch" ]; then
                echo "Applying patch: $patch"
                patch -p1 -i "$patch"
              fi
            done
          fi
        env:
          VLLM_VERSION: ${{ steps.vllm-version.outputs.version }}

      - name: Get source commit SHA
        id: source-commit
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6
        with:
          version: "0.9.26"
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install cibuildwheel

      - name: Build wheels
        run: |
          python3 -m cibuildwheel --output-dir dist
        env:
          CIBW_BUILD: ${{ matrix.python-version }}-*
          CIBW_BEFORE_BUILD_LINUX: >
            yum install -y numactl-devel && if [ -f requirements/build/cpu.txt
            ]; then uv pip install --system -r requirements/build/cpu.txt; else
            uv pip install --system -r requirements/cpu-build.txt; fi
          CIBW_BEFORE_BUILD_MACOS: >
            if [ -f requirements/build/cpu.txt ]; then uv pip install -r
            requirements/build/cpu.txt; else uv pip install -r
            requirements/cpu-build.txt; fi
          CIBW_BUILD_FRONTEND: "build[uv]; args: --no-isolation --skip-dependency-check"
          CIBW_ARCHS: native
          CIBW_SKIP: "*musllinux*"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX:
            "auditwheel repair -w /tmp/cibuildwheel/repaired_wheel {wheel}
            --exclude libcuda.so --exclude libcuda.so.1 --exclude libc10.so
            --exclude libc10_cuda.so --exclude libtorch.so --exclude
            libtorch_python.so --exclude libtorch_cpu.so --exclude
            libtorch_cuda.so --exclude libtorch_cuda_cpp.so --exclude
            libtorch_cuda_cu.so --exclude libcudart.so.11 --exclude
            libcudart.so.12 --exclude libcudart.so.11.0 --exclude
            libcudart.so.12.0 --exclude libcurand.so.10 --exclude
            libcufile_rdma.so --exclude libcufile_rdma.so.1 --exclude
            libcufile.so.1 --exclude libcufile.so.0 --exclude libcufile.so"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS:
            "delocate-wheel --ignore-missing-dependencies -w {dest_dir} -v
            {wheel}"
          CIBW_ENVIRONMENT_LINUX: VLLM_TARGET_DEVICE=cpu
            UV_EXTRA_INDEX_URL=https://download.pytorch.org/whl/cpu
            UV_INDEX_STRATEGY=unsafe-best-match
            VLLM_CPU_AVX512BF16=false
            VLLM_CPU_AVX512VNNI=false
            VLLM_CPU_DISABLE_AVX512=true
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ steps.vllm-version.outputs.version }}
          CIBW_ENVIRONMENT_MACOS: VLLM_TARGET_DEVICE=cpu
            UV_INDEX_STRATEGY=unsafe-best-match
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ steps.vllm-version.outputs.version }}

      - name: Embed SBOM into wheel
        run: |
          for wheel in dist/*.whl; do
            uv run --no-project --script build_scripts/embed_patches.py "$wheel" "build_scripts/patches/${VLLM_VERSION}" \
              --source-repo "https://github.com/vllm-project/vllm" \
              --source-tag "${VLLM_VERSION}" \
              --source-commit "${SOURCE_COMMIT}" \
              --build-repo "https://github.com/astral-sh/build-vllm" \
              --build-commit "${BUILD_COMMIT}"
          done
        env:
          VLLM_VERSION: ${{ steps.vllm-version.outputs.version }}
          SOURCE_COMMIT: ${{ steps.source-commit.outputs.sha }}
          BUILD_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: github.event_name != 'release'
        with:
          name: cibw-wheels-${{ matrix.RUNNER }}-${{ matrix.python-version }}
          path: ./dist/*.whl

      - name: Upload wheels to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@6da8fa9354ddfdc4aeace5fc48d7f679b5214090 # v2.4.1
        with:
          files: ./dist/*.whl
          tag_name: ${{ github.ref_name }}
          append_body: true
